<script>    

1 + 1; // addition
2 - 1; // subtraction
2 * 3; // multiplication
10 / 2; // division
10 % 3; // modulus (remainder)
2 ** 3; // exponentiation (2 raised to the power of 3)

console.log(1 + 1);
console.log(2 - 1);
console.log(2 * 3);
console.log(10 / 2);
console.log(10 % 3);    
console.log(2 ** 3);

const jordan = 150; // amount in collection 
let jordans = "Air jordan"; 
console.log(jordans); 
console.log(jordan);

jordans = 'Retro 3';
jordans = 'Bred 11' // replaces Retro 3, this is nwhere arrays come into play 
console.log(jordans);

</script>
